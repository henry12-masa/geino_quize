let current = 0;
let score = 0;
let answered = false;

function loadQuestion(){
 answered = false;
 document.getElementById("next").classList.add("hidden");
 document.getElementById("result").textContent = "";
 document.getElementById("explain").textContent = "";

 const q = quizData[current];

 document.getElementById("count").textContent = current + 1;
 document.getElementById("question").textContent = q.q;

 const choices = document.getElementById("choices");
 choices.innerHTML = "";

 q.choices.sort(()=>Math.random()-0.5).forEach(choice => {
   const btn = document.createElement("button");
   btn.textContent = choice;
   btn.className = "choice";

   btn.onclick = () => {
     if(answered) return;
     answered = true;

     document.querySelectorAll(".choice").forEach(b => {
       b.disabled = true;
       if(b.textContent === q.answer){
         b.classList.add("correct");
       }
     });

     if(choice === q.answer){
       score += 10;
       document.getElementById("score").textContent = score;
       document.getElementById("result").innerHTML = "<h2>正解！</h2>";
     } else {
       btn.classList.add("wrong");
       document.getElementById("result").innerHTML = "<h2>不正解…</h2>";
     }

     document.getElementById("explain").textContent = q.explain;

     if(current < quizData.length - 1){
       document.getElementById("next").classList.remove("hidden");
     } else {
       finishGame();
     }
   };

   choices.appendChild(btn);
 });
}

function nextQuestion(){
 current++;
 loadQuestion();
}

function finishGame(){
 document.getElementById("question").textContent = "ゲーム終了！";
 document.getElementById("choices").innerHTML = "";
 document.getElementById("result").innerHTML = `<h2>最終スコア：${score}点</h2>`;
 document.getElementById("explain").textContent = "芸能マスターを目指そう！";
 document.getElementById("next").classList.add("hidden");
}

loadQuestion();
</script>
